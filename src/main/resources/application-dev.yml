# Development Profile Overrides
# This profile enhances the base application.yml with development-specific settings
# Logging is configured in logback.xml with springProfile name="dev"
spring:
  datasource:
    hikari:
      # Development settings - smaller pool for local testing
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 900000
      max-lifetime: 1800000

  # Safe local defaults — never use these values in production
  security:
    user:
      name: ${INGESTION_API_USERNAME:dev-user}
      password: ${INGESTION_API_PASSWORD:dev-pass}

