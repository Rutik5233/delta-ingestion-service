# Production Profile Overrides
# This profile enhances the base application.yml with production-specific settings
# Logging is configured in logback.xml with springProfile name="prod"
spring:
  datasource:
    hikari:
      # Production-tuned connection pool settings
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

server:
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    accept-count: 100
