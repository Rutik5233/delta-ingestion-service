spring:
  application:
    name: delta-ingestion-service

  datasource:
    url: jdbc:postgresql://localhost:5432/delta_ingestion
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Basic Auth credentials — values come from environment variables
  security:
    user:
      name: ${INGESTION_API_USERNAME}
      password: ${INGESTION_API_PASSWORD}
      roles: ADMIN

server:
  port: 8080

ingestion:
  chunk-size: 1000

logging:
  level:
    root: INFO
    com.ingestion: DEBUG
    org.flywaydb: DEBUG