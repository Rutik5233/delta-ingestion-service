spring:
  application:
    name: delta-ingestion-service

  # Active profile defaults to 'dev' if not specified
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/delta_ingestion}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      auto-commit: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Basic Auth credentials — values come from environment variables
  security:
    user:
      name: ${INGESTION_API_USERNAME}
      password: ${INGESTION_API_PASSWORD}
      roles: ADMIN

server:
  port: 8080

ingestion:
  chunk-size: 1000
