version: '3.8'

services:

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:15-alpine
    container_name: delta_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: delta_ingestion
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"          # expose to localhost so you can connect via DBeaver/psql too
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d delta_ingestion"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Spring Boot Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delta_ingestion_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override application.yml values with container-specific connection details.
      # 'postgres' here refers to the service name above — Docker resolves it automatically.
      DB_URL: jdbc:postgresql://postgres:5432/delta_ingestion
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # Set Spring profile to prod for production deployments
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    volumes:
      # Create log directory on the host machine for persistent logs
      - ./logs:/var/log/delta-ingestion
    depends_on:
      postgres:
        condition: service_healthy    # wait for postgres healthcheck to pass before starting app
    restart: unless-stopped

volumes:
  postgres_data:    # named volume — survives docker-compose down, deleted only with -v flag
