version: '3.8'

services:

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:15-alpine
    container_name: delta_postgres
    environment:
      POSTGRES_DB: delta_ingestion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"          # expose to localhost so you can connect via DBeaver/psql too
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delta_ingestion"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Spring Boot Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delta_ingestion_app
    ports:
      - "8080:8080"
    environment:
      # Override application.yml values with container-specific connection details.
      # 'postgres' here refers to the service name above — Docker resolves it automatically.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/delta_ingestion
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_FLYWAY_ENABLED: true
    depends_on:
      postgres:
        condition: service_healthy    # wait for postgres healthcheck to pass before starting app
    restart: unless-stopped

volumes:
  postgres_data:    # named volume — survives docker-compose down, deleted only with -v flag
